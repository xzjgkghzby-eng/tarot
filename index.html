<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Tarot">
    <meta name="theme-color" content="#FF6B00">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <title>🎴 Tarot</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f2f2f7;
            color: #1c1c1e;
            min-height: 100vh;
            padding-bottom: 40px;
        }
        .screen { display: none; }
        .screen.active { display: block; }
        .nav {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 16px 20px 12px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(0,0,0,0.08);
        }
        .nav h1 { font-size: 20px; font-weight: 700; }
        .nav .subtitle { font-size: 12px; color: #8e8e93; margin-top: 2px; }
        .container { padding: 16px; max-width: 500px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .card-title {
            font-size: 11px;
            color: #8e8e93;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            font-weight: 600;
        }
        .home-hero { text-align: center; padding: 40px 20px 20px; }
        .home-hero .emoji { font-size: 70px; }
        .home-hero h2 { font-size: 28px; font-weight: 700; margin-top: 12px; }
        .home-hero p { color: #8e8e93; margin-top: 6px; }
        .resume-btn {
            background: #e8f5e9;
            border: 1.5px solid #4caf50;
            border-radius: 14px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            margin-bottom: 12px;
            cursor: pointer;
            text-align: left;
        }
        .resume-btn .icon { font-size: 28px; }
        .resume-btn .text strong { display: block; color: #2e7d32; font-size: 15px; }
        .resume-btn .text span { font-size: 12px; color: #4caf50; }
        .segmented {
            display: flex;
            background: #f2f2f7;
            border-radius: 10px;
            padding: 2px;
            gap: 2px;
        }
        .segmented button {
            flex: 1;
            padding: 8px 4px;
            border: none;
            background: transparent;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #8e8e93;
            cursor: pointer;
            transition: all 0.2s;
        }
        .segmented button.active {
            background: white;
            color: #1c1c1e;
            box-shadow: 0 1px 4px rgba(0,0,0,0.12);
        }
        .input-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #f2f2f7;
        }
        .input-row:last-child { border-bottom: none; }
        .input-row label { font-size: 14px; color: #3c3c43; }
        .input-row input[type="text"], .input-row input[type="number"] {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 14px;
            width: 80px;
            text-align: right;
            outline: none;
            font-family: inherit;
        }
        .input-row input:focus { border-color: #FF6B00; }
        input[type="text"].nom-input { width: 100%; margin-left: 8px; text-align: left; }
        select {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 14px;
            background: white;
            outline: none;
            font-family: inherit;
            color: #1c1c1e;
        }
        .slider-container { padding: 4px 0; }
        .slider-labels { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .slider-labels .att { text-align: left; }
        .slider-labels .def { text-align: right; }
        .slider-labels .label { font-size: 11px; color: #8e8e93; }
        .slider-labels .val { font-size: 22px; font-weight: 700; }
        .slider-labels .att .val { color: #FF6B00; }
        .slider-labels .def .val { color: #007AFF; }
        input[type="range"] { width: 100%; accent-color: #FF6B00; height: 6px; margin: 8px 0; }
        .result-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 10px;
            margin-top: 8px;
            font-size: 13px;
            font-weight: 600;
        }
        .result-badge.gagne { background: #e8f5e9; color: #2e7d32; }
        .result-badge.chute { background: #ffebee; color: #c62828; }
        .score-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f2f2f7;
        }
        .score-row:last-child { border-bottom: none; }
        .score-row .name { font-size: 15px; font-weight: 500; }
        .score-row .score { font-size: 17px; font-weight: 700; }
        .score-row .score.pos { color: #34c759; }
        .score-row .score.neg { color: #ff3b30; }
        .score-row .score.zero { color: #8e8e93; }
        .prime-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 0;
            border-bottom: 1px solid #f2f2f7;
        }
        .prime-row:last-child { border-bottom: none; }
        .prime-row .name { font-size: 13px; min-width: 65px; }
        .prime-row .segmented { flex: 1; }
        .prime-row .segmented button { padding: 5px 2px; font-size: 11px; }
        .toggle-btn {
            background: #f2f2f7;
            border: none;
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 16px;
            cursor: pointer;
        }
        .toggle-btn.active { background: #ffebee; }
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
            margin-bottom: 10px;
            font-family: inherit;
        }
        .btn:active { transform: scale(0.97); }
        .btn-orange { background: #FF6B00; color: white; }
        .btn-green { background: #34c759; color: white; }
        .btn-green:disabled { background: #c7c7cc; }
        .btn-blue { background: #007AFF; color: white; }
        .btn-red { background: #ff3b30; color: white; }
        .btn-gray { background: #f2f2f7; color: #1c1c1e; }
        .suggestions { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; padding-left: 28px; }
        .suggestion-chip {
            background: rgba(255,107,0,0.12);
            color: #FF6B00;
            border: 1px solid rgba(255,107,0,0.3);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 12px;
            cursor: pointer;
            font-family: inherit;
        }
        .donne-row { padding: 10px 0; border-bottom: 1px solid #f2f2f7; }
        .donne-row:last-child { border-bottom: none; }
        .donne-nom { font-size: 12px; color: #8e8e93; margin-bottom: 6px; }
        .gains-row { display: flex; flex-wrap: wrap; gap: 5px; }
        .gain-chip { padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; color: white; }
        .gain-pos { background: rgba(52,199,89,0.85); }
        .gain-neg { background: rgba(255,59,48,0.85); }
        .gain-zero { background: rgba(142,142,147,0.7); }
        .stat-row { padding: 10px 0; border-bottom: 1px solid #f2f2f7; }
        .stat-row:last-child { border-bottom: none; }
        .stat-name { font-size: 15px; font-weight: 600; }
        .stat-score { font-size: 15px; font-weight: 700; }
        .stat-details { font-size: 12px; color: #8e8e93; margin-top: 2px; }
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: flex-end;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: white;
            border-radius: 20px 20px 0 0;
            padding: 20px;
            width: 100%;
            max-height: 60vh;
            overflow-y: auto;
        }
        .modal h3 { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
        .modal-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 8px;
            background: #f2f2f7;
            font-family: inherit;
            text-align: left;
        }
        .modal-btn.danger { color: #ff3b30; }
        .modal-btn.cancel { text-align: center; color: #007AFF; font-weight: 600; }
        /* Légende graphique */
        .graph-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
        }
        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        canvas { width: 100%; border-radius: 10px; }
        .tabs {
            display: flex;
            background: white;
            position: fixed;
            bottom: 0; left: 0; right: 0;
            border-top: 1px solid rgba(0,0,0,0.1);
            padding: 8px 0 20px;
            z-index: 200;
        }
        .tab {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            cursor: pointer;
            padding: 4px;
            border: none;
            background: transparent;
            font-family: inherit;
        }
        .tab .tab-icon { font-size: 22px; }
        .tab .tab-label { font-size: 10px; color: #8e8e93; }
        .tab.active .tab-label { color: #FF6B00; }
        .main-content { padding-bottom: 80px; }
    </style>
</head>
<body>

<!-- ÉCRAN ACCUEIL / SETUP -->
<div id="screen-setup" class="screen active">
    <div class="container">
        <div class="home-hero">
            <div class="emoji">🎴</div>
            <h2>Tarot</h2>
            <p>Compteur de points</p>
        </div>
        <div id="resume-section" style="display:none">
            <button class="resume-btn" onclick="reprendrePartie()">
                <span class="icon">🔄</span>
                <span class="text">
                    <strong>Reprendre la partie</strong>
                    <span>Continuer là où vous vous étiez arrêtés</span>
                </span>
            </button>
        </div>
        <div class="card">
            <div class="card-title">👥 Nombre de joueurs</div>
            <div class="segmented" id="mode-picker">
                <button onclick="setMode(3)">3 joueurs</button>
                <button onclick="setMode(4)" class="active">4 joueurs</button>
                <button onclick="setMode(5)">5 joueurs</button>
            </div>
        </div>
        <div class="card" id="noms-card">
            <div class="card-title">✏️ Noms des joueurs</div>
            <div id="noms-inputs"></div>
        </div>
        <button class="btn btn-orange" id="start-btn" onclick="demarrerPartie()" disabled>
            ▶️ Nouvelle partie
        </button>
    </div>
</div>

<!-- ÉCRAN JEU -->
<div id="screen-jeu" class="screen">
    <div class="nav">
        <div style="display:flex;justify-content:space-between;align-items:center">
            <div style="font-size:18px;font-weight:700">🎴 Tarot</div>
            <button onclick="goSetup()" style="background:none;border:none;font-size:13px;color:#FF6B00;cursor:pointer">⚙️ Paramètres</button>
        </div>
    </div>
    <div class="main-content">
        <div class="container">
            <!-- Classement -->
            <div class="card">
                <div class="card-title">👑 Classement</div>
                <div id="classement"></div>
            </div>
            <!-- Manche -->
            <div class="card">
                <div class="card-title">🎯 Manche</div>
                <div class="input-row">
                    <label>Preneur</label>
                    <select id="sel-preneur" onchange="updateUI()"></select>
                </div>
                <div class="input-row" id="row-partenaire" style="display:none">
                    <label>Partenaire</label>
                    <select id="sel-partenaire"></select>
                </div>
                <div class="input-row">
                    <label>Contrat</label>
                    <select id="sel-contrat">
                        <option value="1">Petite ×1</option>
                        <option value="2">Garde ×2</option>
                        <option value="4">Sans ×4</option>
                        <option value="6">Contre ×6</option>
                    </select>
                </div>
                <div class="input-row">
                    <label>Bouts</label>
                    <select id="sel-bouts" onchange="updateSeuil()">
                        <option value="0">0 bout (56 pts)</option>
                        <option value="1">1 bout (51 pts)</option>
                        <option value="2">2 bouts (41 pts)</option>
                        <option value="3">3 bouts (36 pts)</option>
                    </select>
                </div>
                <!-- Slider double -->
                <div class="slider-container" style="margin-top:12px">
                    <div class="slider-labels">
                        <div class="att">
                            <div class="label">⚔️ Attaque</div>
                            <div class="val" id="val-attaque">0</div>
                        </div>
                        <div class="def">
                            <div class="label">🛡️ Défense</div>
                            <div class="val" id="val-defense">91</div>
                        </div>
                    </div>
                    <input type="range" id="slider-pts" min="0" max="91" step="1" value="0"
                           oninput="onSlider(this.value)">
                    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:6px">
                        <label style="font-size:12px;color:#8e8e93">Saisie manuelle</label>
                        <input type="number" id="input-pts" min="0" max="91" placeholder="0–91"
                               oninput="onManual(this.value)"
                               style="width:70px;border:1px solid #e0e0e0;border-radius:8px;padding:6px 10px;font-size:14px;text-align:right;font-family:inherit">
                    </div>
                    <div id="result-badge" style="display:none" class="result-badge"></div>
                </div>
            </div>
            <!-- Primes -->
            <div class="card">
                <div class="card-title">💎 Primes</div>
                <div class="input-row">
                    <label>🚩 Petit au bout</label>
                    <select id="sel-petitaubout">
                        <option value="-1">Personne</option>
                    </select>
                </div>
                <div class="input-row">
                    <label>✨ Chelem</label>
                    <select id="sel-chelem">
                        <option value="0">Aucun</option>
                        <option value="1">Annoncé et réussi (+400)</option>
                        <option value="2">Réussi non annoncé (+200)</option>
                        <option value="3">Annoncé mais chuté (−200)</option>
                        <option value="4">Réalisé par la défense (−200)</option>
                    </select>
                </div>
                <div style="margin-top:10px">
                    <div style="font-size:12px;color:#8e8e93;margin-bottom:8px">Poignées
